<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munene Enterprises</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Montserrat',sans-serif;color:white;overflow-x:hidden;background:black}

header{position:fixed;width:100%;display:flex;justify-content:space-between;padding:20px 40px;z-index:100}
nav a{color:white;margin:0 15px;text-decoration:none;font-size:14px}
nav a:hover{opacity:0.7}

section{height:100vh;position:relative;display:flex;flex-direction:column;justify-content:space-between;text-align:center;scroll-snap-align:start}
html{scroll-snap-type:y mandatory}

.section-bg{position:absolute;width:100%;height:100%;object-fit:cover;top:0;left:0;z-index:-2;filter:brightness(0.55);transform:scale(1.1)}

.overlay{position:absolute;width:100%;height:100%;top:0;left:0;background:linear-gradient(to bottom,rgba(0,0,0,0.3),rgba(0,0,0,0.85));z-index:-1}

/* TEXT REVEAL */
.reveal{display:inline-block;overflow:hidden}
.reveal span{
display:inline-block;
transform:translateY(100%);
opacity:0;
animation:revealUp 0.6s forwards;
}

@keyframes revealUp{
to{transform:translateY(0);opacity:1}
}

.content{margin-top:120px;opacity:0;transform:translateY(40px);transition:all 0.8s ease}
.content.show{opacity:1;transform:translateY(0)}

.content h1{font-size:48px;margin-bottom:10px;letter-spacing:1px}
.content p{font-size:18px;opacity:0.9}

.buttons{margin-bottom:60px;opacity:0;transform:translateY(40px);transition:all 1s ease}
.buttons.show{opacity:1;transform:translateY(0)}

.buttons button{
padding:12px 25px;
margin:10px;
border-radius:25px;
border:none;
cursor:pointer;
font-weight:600;
transition:all 0.3s ease;
}

.primary{background:white;color:black}
.primary:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,255,255,0.6)}

.secondary{background:rgba(0,0,0,0.4);color:white;border:1px solid white}
.secondary:hover{background:white;color:black}

.scroll-indicator{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:0.7;
animation:bounce 2s infinite
}

@keyframes bounce{
0%,100%{transform:translate(-50%,0)}
50%{transform:translate(-50%,10px)}
}

@media(max-width:768px){
.content h1{font-size:32px}
}
</style>
</head>

<body>

<header>
<div style="font-weight:700">Munene</div>
<nav>
<a href="#home">Home</a>
<a href="#agriculture">Agriculture</a>
<a href="#printing">Printing</a>
<a href="#branding">Branding</a>
</nav>
</header>

<section id="home">
<img src="./assets/images/hero.jpg" class="section-bg">
<div class="overlay"></div>

<div class="content">
<h1 class="reveal" data-text="Munene Enterprises"></h1>
<p>Powering Business Through Agriculture, Printing & Branding</p>
</div>

<div class="buttons">
<button class="primary">Get Started</button>
<button class="secondary">Learn More</button>
</div>

<div class="scroll-indicator">Scroll ↓</div>
</section>

<section id="agriculture">
<img src="./assets/images/farm.jpg" class="section-bg">
<div class="overlay"></div>

<div class="content">
<h1 class="reveal" data-text="Agriculture"></h1>
<p>Fresh produce and modern farming solutions</p>
</div>

<div class="buttons">
<button class="primary">Explore</button>
<button class="secondary">Contact</button>
</div>
</section>

<section id="printing">
<img src="./assets/images/printing.jpg" class="section-bg">
<div class="overlay"></div>

<div class="content">
<h1 class="reveal" data-text="Printing"></h1>
<p>High-quality prints that define your brand</p>
</div>

<div class="buttons">
<button class="primary">View Services</button>
<button class="secondary">Get Quote</button>
</div>
</section>

<section id="branding">
<img src="./assets/images/invest.jpg" class="section-bg">
<div class="overlay"></div>

<div class="content">
<h1 class="reveal" data-text="Branding"></h1>
<p>Creative identity that makes you stand out</p>
</div>

<div class="buttons">
<button class="primary">Our Work</button>
<button class="secondary">Start Project</button>
</div>
</section>

<script>
// split text into letters
function splitText(el){
const text = el.getAttribute('data-text');
el.innerHTML = text.split('').map(letter => `<span>${letter}</span>`).join('');
}
document.querySelectorAll('.reveal').forEach(splitText);

// reveal on scroll
const observer = new IntersectionObserver(entries => {
entries.forEach(entry => {
if(entry.isIntersecting){
entry.target.querySelector('.content')?.classList.add('show');
entry.target.querySelector('.buttons')?.classList.add('show');
}
});
},{threshold:0.4});

document.querySelectorAll('section').forEach(section=>observer.observe(section));

// parallax effect
window.addEventListener('scroll',()=>{
document.querySelectorAll('.section-bg').forEach(bg=>{
let offset = window.scrollY * 0.25;
bg.style.transform = `scale(1.1) translateY(${offset}px)`;
});
});
</script>

</body>
  </html>
