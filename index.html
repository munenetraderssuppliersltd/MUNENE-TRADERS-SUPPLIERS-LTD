<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munene ERP System</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b132b;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#1c2541;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1c2541;
padding:15px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
}

button{
background:#e63946;
border:none;
color:white;
cursor:pointer;
}

section{padding:20px;}

.hidden{display:none;}
</style>
</head>

<body>

<header>
<h2>Munene ERP System</h2>
<nav>
<a onclick="show('dash')">Dashboard</a>
<a onclick="show('farm')">Farm</a>
<a onclick="show('print')">Printing</a>
<a onclick="show('invest')">Investment</a>
</nav>
</header>

<!-- DASHBOARD -->
<section id="dash">
<h3>Operational Dashboard</h3>

<div class="grid">
<div class="card">
<h3>Farm Stock</h3>
<p id="farmTotal">0</p>
</div>

<div class="card">
<h3>Print Jobs</h3>
<p id="printTotal">0</p>
</div>

<div class="card">
<h3>Investment Value</h3>
<p id="investTotal">0</p>
</div>
</div>
</section>

<!-- FARM -->
<section id="farm" class="hidden">
<h3>Farm Operations</h3>

<input id="fName" placeholder="Product">
<input id="fQty" placeholder="Stock Qty">
<button onclick="addFarm()">Add Stock</button>
<button onclick="useStock()">Use Stock</button>

<div id="farmList" class="grid"></div>
</section>

<!-- PRINT -->
<section id="print" class="hidden">
<h3>Printing Operations</h3>

<input id="pType" placeholder="Job Type">
<input id="pQty" placeholder="Quantity">
<button onclick="addPrint()">Create Job</button>

<div id="printList" class="grid"></div>
</section>

<!-- INVEST -->
<section id="invest" class="hidden">
<h3>Investment Ledger</h3>

<input id="iName" placeholder="Investor">
<input id="iAmt" placeholder="Amount">
<button onclick="addInvest()">Add Investment</button>

<div id="investList" class="grid"></div>
</section>

<script>

/* SYSTEM DATA */
let farm = JSON.parse(localStorage.getItem("farm")) || [];
let print = JSON.parse(localStorage.getItem("print")) || [];
let invest = JSON.parse(localStorage.getItem("invest")) || [];

/* NAV */
function show(x){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(x).classList.remove("hidden");
}

/* FARM OPERATIONS */
function addFarm(){
farm.push({
name:fName.value,
qty:parseInt(fQty.value)
});
save();
renderFarm();
}

function useStock(){
let name=fName.value;
let qty=parseInt(fQty.value);

let item=farm.find(f=>f.name===name);
if(item){
item.qty-=qty;
if(item.qty<0)item.qty=0;
}
save();
renderFarm();
}

function renderFarm(){
farmList.innerHTML="";
farm.forEach(f=>{
farmList.innerHTML+=`
<div class="card">
<h3>${f.name}</h3>
<p>Stock: ${f.qty}</p>
</div>`;
});
update();
}

/* PRINTING OPS */
function addPrint(){
print.push({
type:pType.value,
qty:pQty.value,
status:"Pending"
});
save();
renderPrint();
}

function renderPrint(){
printList.innerHTML="";
print.forEach(p=>{
printList.innerHTML+=`
<div class="card">
<h3>${p.type}</h3>
<p>${p.qty}</p>
<p>Status: ${p.status}</p>
</div>`;
});
update();
}

/* INVESTMENT OPS */
function addInvest(){
invest.push({
name:iName.value,
amount:parseInt(iAmt.value),
roi:0.15
});
save();
renderInvest();
}

function renderInvest(){
investList.innerHTML="";
invest.forEach(i=>{
let profit=i.amount*i.roi;
investList.innerHTML+=`
<div class="card">
<h3>${i.name}</h3>
<p>Capital: ${i.amount}</p>
<p>Profit: ${profit}</p>
</div>`;
});
update();
}

/* SAVE */
function save(){
localStorage.setItem("farm",JSON.stringify(farm));
localStorage.setItem("print",JSON.stringify(print));
localStorage.setItem("invest",JSON.stringify(invest));
}

/* DASHBOARD */
function update(){
farmTotal.innerText=farm.reduce((a,b)=>a+b.qty,0);
printTotal.innerText=print.length;
investTotal.innerText=invest.reduce((a,b)=>a+b.amount,0);
}

renderFarm();
renderPrint();
renderInvest();
update();

</script>

</body>
  </html>
